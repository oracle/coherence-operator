kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
  - role: worker
#  - role: worker
networking:
  disableDefaultCNI: true
kubeadmConfigPatches:
# Keep this patch unversioned so kind can convert it to the kubeadm API used by
# each Kubernetes node image; this preserves the Calico CIDRs across v1beta3 and
# v1beta4 clusters instead of pinning the old v1beta2 format.
- |
  kind: ClusterConfiguration
  networking:
    serviceSubnet: "10.96.0.1/12"
    podSubnet: "192.168.0.0/16"
