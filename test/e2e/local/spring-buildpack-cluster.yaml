apiVersion: coherence.oracle.com/v1
kind: Coherence
metadata:
  name: spring-test
spec:
  replicas: 3
  image: ${TEST_APPLICATION_IMAGE_SPRING_CNBP}
  application:
    type: spring
  jvm:
    args:
      - -Dcoherence.log=jdk
      - -Dcoherence.k8s.operator.health.logs=true
  ports:
    - name: web
      port: 8080