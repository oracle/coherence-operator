apiVersion: coherence.oracle.com/v1
kind: Coherence
metadata:
  name: helidon-test
spec:
  replicas: 3
  image: ${TEST_APPLICATION_IMAGE_HELIDON}
  application:
    type: helidon
  jvm:
    args:
      - -Dcoherence.log=jdk
      - -Dcoherence.k8s.operator.health.logs=true
  ports:
    - name: web
      port: 8080
