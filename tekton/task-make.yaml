apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: make
spec:
  description: Run a make target.
  params:
    - name: command
      description: The make command to run.
      type: string
      default: ""
    - name: sub-directory
      description: The workspace subdirectory containing the Makefile.
      type: string
      default: ""
    - name: image
      description: The image to run.
      type: string
      default: ""
    - name: httpProxy
      description: HTTP proxy server for non-SSL requests.
      type: string
      default: ""
    - name: httpsProxy
      description: HTTPS proxy server for SSL requests.
      type: string
      default: ""
    - name: noProxy
      description: Opt out of proxying HTTP/HTTPS requests.
      type: string
      default: ""
  workspaces:
    - name: shared-data
      description: |
        This workspace contains the Makefile
  steps:
    - name: make
      image: $(params.image)
      env:
        - name: PARAM_HTTP_PROXY
          value: $(params.httpProxy)
        - name: PARAM_HTTPS_PROXY
          value: $(params.httpsProxy)
        - name: PARAM_NO_PROXY
          value: $(params.noProxy)
        - name: WORKSPACE
          value: $(workspaces.shared-data.path)/$(params.sub-directory)
      script: |
        set -e
        
        test -z "${PARAM_HTTP_PROXY}" || export HTTP_PROXY="${PARAM_HTTP_PROXY}"
        test -z "${PARAM_HTTPS_PROXY}" || export HTTPS_PROXY="${PARAM_HTTPS_PROXY}"
        test -z "${PARAM_NO_PROXY}" || export NO_PROXY="${PARAM_NO_PROXY}"

        cd ${WORKSPACE}
        make $(params.command)